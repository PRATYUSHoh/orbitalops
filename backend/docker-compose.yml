services:
  app:
    build: .
    ports:
      - "3001:3001"
    env_file: .env.local
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: orbitalops
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No ports needed — app reaches PostgreSQL over Docker's internal
    # network using hostname "postgres".

  redis:
    image: redis:7
    # No ports needed — app reaches Redis over Docker's internal
    # network using hostname "redis".

  worker:
    build: .
    command: node src/workers/telemetryWorker.js
    env_file: .env.local
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    # No host port mapping needed — Prometheus reaches this container's
    # :3002 metrics endpoint via the internal Docker network using
    # hostname "worker", same pattern as postgres/redis.

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app
      - worker

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  grafanadata: